# ============================================================================
# GITHUB ACTIONS CI/CD WORKFLOW: PRODUCTION DEPLOYMENT
# ============================================================================
# Dit script automatiseert het build- en migratieproces van de Area52 productie-
# omgeving naar Google Cloud Run zodra er een push plaatsvindt op de 'main' branch.

name: Deploy to Production Cloud Run

# Trigger-configuratie: Het script wordt uitsluitend geactiveerd bij wijzigingen op de productie-branch.
on:
  push:
    branches:
      - main

# Omgevingsvariabelen die globaal binnen deze workflow worden gebruikt.
env:
  PROJECT_ID: area52-494218
  REGION: europe-west1
  REPO_NAME: area52-prod-repo
  SERVICE_NAME: area52-backend-prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # LET OP: Hier staat nu de juiste, nieuwe kluisnaam voor productie!
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_PROD_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and Push Container Image
        run: |
          IMAGE_URL="europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest"
          docker build -t $IMAGE_URL .
          docker push $IMAGE_URL

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: europe-west1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:latest
          flags: --allow-unauthenticated --port=8080