<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area52 Admin | Inloggen</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="auth-brand__logo">🌲</div>
                <span class="auth-brand__title">Area52 Admin</span>
            </div>

            <h2>Inloggen</h2>
            <form id="login-form">
                <div class="auth-field">
                    <label for="email">E-mailadres</label>
                    <input id="email" type="email" required placeholder="naam@voorbeeld.nl">
                </div>
                <div class="auth-field">
                    <label for="password">Wachtwoord</label>
                    <input id="password" type="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="auth-btn">Inloggen</button>
            </form>

            <p id="login-message" class="auth-message"></p>

            <p class="auth-footer">
                Nog geen account? <a href="/register">Registreer hier</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageBox = document.getElementById('login-message');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('area52_token', data.token);
                    localStorage.setItem('token', data.token);
                    window.location.href = '/dashboard';
                } else {
                    messageBox.className = 'auth-message auth-message--error';
                    messageBox.innerText = data.message || 'Inloggen mislukt.';
                }
            } catch {
                messageBox.className = 'auth-message auth-message--error';
                messageBox.innerText = 'Fout bij verbinden met de server.';
            }
        });
    </script>
</body>
</html>
