<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area52 Admin | Registreren</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="auth-brand__logo">🌲</div>
                <span class="auth-brand__title">Area52 Admin</span>
            </div>

            <h2>Account aanmaken</h2>
            <form id="register-form">
                <div class="auth-field">
                    <label for="email">E-mailadres</label>
                    <input id="email" type="email" required placeholder="naam@voorbeeld.nl">
                </div>
                <div class="auth-field">
                    <label for="password">Wachtwoord</label>
                    <input id="password" type="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="auth-btn">Registreer</button>
            </form>

            <p id="register-message" class="auth-message"></p>

            <p class="auth-footer">
                Al een account? <a href="/login">Log hier in</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageBox = document.getElementById('register-message');

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role: 'admin' })
                });

                let data;
                try {
                    data = await res.json();
                } catch {
                    messageBox.className = 'auth-message auth-message--error';
                    messageBox.innerText = 'Server gaf geen geldig antwoord. Controleer database-configuratie op Cloud Run.';
                    return;
                }

                if (res.ok) {
                    messageBox.className = 'auth-message auth-message--success';
                    messageBox.innerText = 'Succesvol! Je wordt doorgestuurd...';
                    setTimeout(() => { window.location.href = '/login'; }, 1000);
                } else {
                    messageBox.className = 'auth-message auth-message--error';
                    messageBox.innerText = data.message || 'Registratie mislukt.';
                }
            } catch {
                messageBox.className = 'auth-message auth-message--error';
                messageBox.innerText = 'Fout bij verbinden met de server.';
            }
        });
    </script>
</body>
</html>
