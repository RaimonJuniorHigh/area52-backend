<!DOCTYPE html>
<html>
<body>
    <h2>Registreren</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Wachtwoord">
    <button onclick="register()">Account Aanmaken</button>
    <script>
        async function register() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const res = await fetch('https://area52-backend-562976809707.europe-west1.run.app/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if(res.ok) { alert("Gelukt!"); window.location.href = '/login'; }
            else { alert("Fout bij registratie"); }
        }
    </script>
</body>
</html>
