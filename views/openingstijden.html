<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area52 | Openingstijden</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-layout" data-page="hours">

    <div class="admin-shell" id="guest-shell">
        <main class="admin-content">

            <div class="admin-page-header">
                <h1>Openingstijden</h1>
            </div>

            <p class="guest-intro">Bekijk wanneer alle voorzieningen en activiteiten open zijn in Area52.</p>
            <p id="hours-message" class="auth-message"></p>

            <div id="hours-grid" class="hours-grid"></div>

        </main>
    </div>

    <script src="/js/auth-utils.js"></script>
    <script src="/js/guest-layout.js"></script>
    <script src="/js/guest-opening-hours.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            GuestLayout.init();
            GuestOpeningHours.init();
        });
    </script>
</body>
</html>
